name: Daily News Scout

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "0 8 * * *"
  # Allow a manual run from the Actions tab
  workflow_dispatch:

# Minimal permissions – this workflow only reads the repository and calls
# external APIs (OpenAI, Azure Communication Services). No write access to the repo is needed.
permissions:
  contents: read

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run News Scout
        env:
          AZURE_OPENAI_API_KEY:      ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT:     ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT:   ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          # Optional – override the default API version (2024-12-01-preview)
          AZURE_OPENAI_API_VERSION:  ${{ vars.AZURE_OPENAI_API_VERSION }}
          EMAIL_TO:                  ${{ secrets.EMAIL_TO }}
          ACS_CONNECTION_STRING:     ${{ secrets.ACS_CONNECTION_STRING }}
          ACS_SENDER_ADDRESS:        ${{ secrets.ACS_SENDER_ADDRESS }}
        run: python main.py
